subscription:
  env_var: UPSTREAM_SUB_URL

artifacts:
  public_base_url_env: PUBLIC_BASE_URL
  default_public_base_url: https://suehn.github.io/mihomo-subscription-builder

network:
  user_agent: mihomo-subscription-builder/0.1

rules:
  - id: private
    policy: DIRECT
    outputs:
      mihomo:
        source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
        path: rules/mihomo/private.yaml
        behavior: domain
      shadowrocket:
        source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
        path: rules/shadowrocket/private.list
        transform: metacubex_domain_to_shadowrocket
  - id: cn
    policy: DIRECT
    outputs:
      mihomo:
        source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.yaml

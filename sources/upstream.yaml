subscription:
  env_var: UPSTREAM_SUB_URL
artifacts:
  public_base_url_env: PUBLIC_BASE_URL
  private_base_url_env: PRIVATE_BASE_URL
  default_public_base_url: https://suehn.github.io/mihomo-subscription-builder
network:
  user_agent: mihomo-subscription-builder/0.1
rules:
- id: private
  policy: DIRECT
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
      path: rules/mihomo/private.yaml
      behavior: domain
    shadowrocket:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
      path: rules/shadowrocket/private.list
      transform: metacubex_domain_to_shadowrocket
- id: cn
  policy: DIRECT
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.yaml
      path: rules/mihomo/cn.yaml
      behavior: domain
    shadowrocket:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.yaml
      path: rules/shadowrocket/cn.list
      transform: metacubex_domain_to_shadowrocket
- id: geolocation_non_cn
  policy: PROXY
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.yaml
      path: rules/mihomo/geolocation-!cn.yaml
      behavior: domain
    shadowrocket:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.yaml
      path: rules/shadowrocket/geolocation-!cn.list
      transform: metacubex_domain_to_shadowrocket
- id: cn_ip
  policy: DIRECT
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.yaml
      path: rules/mihomo/cn_ip.yaml
      behavior: ipcidr
    shadowrocket:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.yaml
      path: rules/shadowrocket/cn_ip.list
      transform: metacubex_ipcidr_to_shadowrocket
- id: github
  policy: GitHub
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml
      path: rules/mihomo/github.yaml
      behavior: domain
    shadowrocket:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml
      path: rules/shadowrocket/github.list
      transform: metacubex_domain_to_shadowrocket
- id: google
  policy: Google
  outputs:
    mihomo:
      source_url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.yaml

      path: rules/shadowrocket/google.list
      transform: metacubex_domain_to_shadowrocket
- id: developer_global
  policy: Developer
  outputs:
    mihomo:
      source_file: rules/custom/developer_global.txt
      path: rules/mihomo/developer_global.txt
      behavior: classical
      format: text
    shadowrocket:
      source_file: rules/custom/developer_global.txt
      path: rules/shadowrocket/developer_global.conf
- id: ads
  policy: REJECT

name: publish-subscriptions

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_SUB_URL: ${{ secrets.UPSTREAM_SUB_URL }}
      PUBLIC_BASE_URL: https://suehn.github.io/mihomo-subscription-builder
      PRIVATE_BASE_URL: ${{ secrets.PRIVATE_BASE_URL }}
      PRIVATE_SSH_HOST: ${{ secrets.PRIVATE_SSH_HOST }}
      PRIVATE_SSH_USER: ${{ secrets.PRIVATE_SSH_USER }}
      PRIVATE_SSH_PORT: ${{ secrets.PRIVATE_SSH_PORT }}
      PRIVATE_SSH_PATH: ${{ secrets.PRIVATE_SSH_PATH }}
      PRIVATE_SSH_KEY: ${{ secrets.PRIVATE_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest

      - name: Select publish mode
        run: |
          if [ -n "$PRIVATE_BASE_URL" ] && [ -n "$PRIVATE_SSH_HOST" ] && [ -n "$PRIVATE_SSH_USER" ] && [ -n "$PRIVATE_SSH_PATH" ] && [ -n "$PRIVATE_SSH_KEY" ]; then
            echo "PRIVATE_DEPLOY_ENABLED=true" >> "$GITHUB_ENV"
            echo "PAGES_ARTIFACT_PATH=public-dist" >> "$GITHUB_ENV"
            echo "EFFECTIVE_PRIVATE_BASE_URL=$PRIVATE_BASE_URL" >> "$GITHUB_ENV"
          else
            echo "PRIVATE_DEPLOY_ENABLED=false" >> "$GITHUB_ENV"
            echo "PAGES_ARTIFACT_PATH=dist" >> "$GITHUB_ENV"
            echo "EFFECTIVE_PRIVATE_BASE_URL=" >> "$GITHUB_ENV"
          fi

      - name: Build artifacts
        run: PRIVATE_BASE_URL="$EFFECTIVE_PRIVATE_BASE_URL" python -m subscription_builder.cli build-all

      - name: Validate artifacts
        run: python -m subscription_builder.cli validate

      - name: Prepare public Pages artifact
        run: python -m subscription_builder.cli prepare-public-pages

      - name: Deploy private full subscriptions
        if: env.PRIVATE_DEPLOY_ENABLED == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PRIVATE_SSH_KEY" > ~/.ssh/private_deploy_key
          chmod 600 ~/.ssh/private_deploy_key
          SSH_PORT="${PRIVATE_SSH_PORT:-22}"
          case "$PRIVATE_SSH_PATH" in
            ""|"/"|"."|"~")
              echo "Refusing unsafe PRIVATE_SSH_PATH: $PRIVATE_SSH_PATH" >&2
              exit 1
              ;;
          esac
          ssh-keyscan -p "$SSH_PORT" "$PRIVATE_SSH_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete -e "ssh -i ~/.ssh/private_deploy_key -p $SSH_PORT" dist/ "$PRIVATE_SSH_USER@$PRIVATE_SSH_HOST:$PRIVATE_SSH_PATH/"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ARTIFACT_PATH }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
